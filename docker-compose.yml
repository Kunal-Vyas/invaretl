version: "3.8"

services:
  app:
    build: .
    container_name: invaretl-app
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - DATABASE_URL=${DATABASE_URL:-jdbc:postgresql://db:5432/invaretl}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - invaretl-network

  db:
    image: postgres:16-alpine
    container_name: invaretl-db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-invaretl}
      - POSTGRES_USER=${POSTGRES_USER:-invartek}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-invartek} -d ${POSTGRES_DB:-invaretl}",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - invaretl-network

volumes:
  postgres_data:
    driver: local

networks:
  invaretl-network:
    driver: bridge
