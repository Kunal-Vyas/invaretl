version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=invaretl
      - POSTGRES_USER=invartek
      - POSTGRES_PASSWORD=invartek
    ports:
      - "5432:5432"
