name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run server tests
        run: ./gradlew :server:test

      - name: Generate server test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Backend Tests (server)
          path: server/build/test-results/test/TEST-*.xml
          reporter: java-junit

      - name: Upload server test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: server-test-results
          path: server/build/reports/tests/test/
          retention-days: 7

      - name: Run mcp tests
        working-directory: ./mcp
        run: ./gradlew test

      - name: Generate mcp test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Backend Tests (mcp)
          path: mcp/build/test-results/test/TEST-*.xml
          reporter: java-junit

      - name: Upload mcp test results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: mcp-test-results
          path: mcp/build/reports/tests/test/
          retention-days: 7

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./ui
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: ./ui
        # --run exits after a single pass (non-interactive, required in CI)
        # --coverage generates lcov/html/json reports under ui/coverage/
        run: npm run test -- --run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: frontend-coverage
          path: ui/coverage/
          retention-days: 7

      - name: Build frontend
        working-directory: ./ui
        run: npm run build

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: invartek/invaretl
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to production
        run: |
          echo "Deployment step would go here"
          echo "This could involve:"
          echo "- Updating docker-compose file on production server"
          echo "- Running docker compose pull and up"
          echo "- Running database migrations if needed"
          echo "- Health checks"
